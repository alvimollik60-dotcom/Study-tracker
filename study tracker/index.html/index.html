<!DOCTYPE html>
<html>
<head>
  <title>Study Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">

  <h1>📚 Study Hub PRO</h1>

  <button onclick="login()">🔐 Login with Google</button>

  <div class="card">
    <h2>👥 Online Users</h2>
    <div id="users"></div>
  </div>

  <div class="card">
    <h2>💬 Chat</h2>
    <div id="chatBox"></div>
    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Send</button>
  </div>

  <div class="card">
    <h2>📁 Share Link</h2>
    <input id="file" placeholder="Google Drive link">
    <button onclick="sendFile()">Share</button>
    <div id="files"></div>
  </div>

</div>



</body>
</html>
